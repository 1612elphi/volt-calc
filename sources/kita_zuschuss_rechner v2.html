// ─── CALCULATION ─────────────────────────────────────────────
function berechne(input, lang) {
  const t = T[lang];
  const {
    haushaltGroesse, isAlleinerziehend,
    nettoE1, fahrtkostenE1, sonstigeE1,
    nettoE2, fahrtkostenE2, sonstigeE2,
    kindesunterhalt, versicherungAbzug, besondereBelastungen,
    kitaBeitrag, beziehtSozialleistung,
  } = input;

  if (beziehtSozialleistung) {
    return { einkommen: null, ekg1: null, ekg3: null, ekg4: null, pct: 100, leistung: kitaBeitrag, stufe: "sozial", details: t.detailSozial, nahGrenze: false };
  }

  const abzugE1 = ((nettoE1 || 0) > 0) ? ARBEITSMITTEL_PAUSCHALE + (fahrtkostenE1 || 0) : 0;
  const abzugE2 = (!isAlleinerziehend && (nettoE2 || 0) > 0) ? ARBEITSMITTEL_PAUSCHALE + (fahrtkostenE2 || 0) : 0;

  const e1 = Math.max(0, (nettoE1 || 0) - abzugE1) + (sonstigeE1 || 0);
  const e2 = isAlleinerziehend ? 0 : Math.max(0, (nettoE2 || 0) - abzugE2) + (sonstigeE2 || 0);
  const ek = KINDERGELD + (kindesunterhalt || 0);
  const gesamt = e1 + e2 + ek - (versicherungAbzug || 0);

  const sz = Math.min(Math.max(haushaltGroesse, 1), 6);
  const ekg1 = GRUNDBETRAG + (haushaltGroesse - 1) * FAMILIENZUSCHLAG + (HOECHSTMIETE[sz] || HOECHSTMIETE[6]);
  const ekg3 = ekg1 * EKG_FAKTOR_VOLL + (besondereBelastungen || 0);
  const ekg4 = ekg1 * EKG_FAKTOR_HALB + (besondereBelastungen || 0);

  let pct, stufe, details;
  if (gesamt <= ekg1) { pct = 100; stufe = "EKG1"; details = t.detailEkg1; }
  else if (gesamt <= ekg3) { pct = 100; stufe = "EKG3"; details = t.detailEkg3; }
  else if (gesamt <= ekg4) { pct = 50; stufe = "EKG4"; details = t.detailEkg4; }
  else { pct = 0; stufe = "none"; details = t.detailNone; }

  // Reine Anzeige-Information — verändert weder pct noch leistung: Einkommen
  // liegt über EKG4, aber weniger als 10 % darüber (Antrag lohnt sich trotzdem).
  const nahGrenze = gesamt > ekg4 && gesamt < ekg4 * GRENZNAEHE_TOLERANZ;

  const r = (v) => Math.round(v * 100) / 100;
  return { einkommen: r(gesamt), ekg1: r(ekg1), ekg3: r(ekg3), ekg4: r(ekg4), pct, leistung: r(kitaBeitrag * pct / 100), stufe, details, nahGrenze };
}

            <Section title={t.einkommenElternteil2}>
              <NumField label={t.nettoLabel} value={nettoE2} onChange={setNettoE2} hint={t.nettoHint} />
              <NumField label={t.fahrtkostenLabel} value={fahrtkostenE2} onChange={setFahrtkostenE2} hint={t.fahrtkostenHint} />
              <NumField label={t.sonstigeLabel} value={sonstigeE2} onChange={setSonstigeE2} hint={t.sonstigeHint} />
            </Section>
          )}

          <Section title={t.antragskindAbzuege}>
            <NumField label={t.kindesunterhaltLabel} value={kindesunterhalt} onChange={setKindesunterhalt} hint={t.kindesunterhaltHint} />
            <NumField label={t.versicherungLabel} value={versicherungAbzug} onChange={setVersicherung} hint={t.versicherungHint} />
          </Section>

          <Section title={t.besondereBelastungen} accentColor="#f59e0b">
            <NumField label={t.belastungenLabel} value={besondereBelastungen} onChange={setBelastungen} hint={t.belastungenHint} />
          </Section>
        </>
      )}

      <Section title={t.kitaBeitrag} accentColor="#16a34a">
        <NumField label={t.kitaBeitragLabel} value={kitaBeitrag} onChange={setKitaBeitrag} hint={t.kitaBeitragHint} />
      </Section>

      {/* ═══ RESULT ═══ */}
      {(() => {
        const resultBg = r.pct === 100 ? "#f0fdf4" : r.pct === 50 ? "#fffbeb" : "#fef2f2";
        const resultBorder = r.pct === 100 ? "#dcfce7" : r.pct === 50 ? "#fef3c7" : "#fee2e2";
        const scaleMax = r.ekg4 ? Math.max(r.ekg4, r.einkommen || 0) * 1.15 : 1;
        const pos = v => Math.min((v / scaleMax) * 100, 100);
        const eur = v => v.toLocaleString("de-DE", { maximumFractionDigits: 0 });

        return (
          <div className="rounded-2xl mt-2 overflow-hidden" style={{ backgroundColor: resultBg, border: `1px solid ${resultBorder}` }}>
            <div className="px-5 py-5">
              {/* Percentage */}
              <div className="text-center mb-3">
                <p className="text-[10px] uppercase tracking-[2px] text-slate-400 mb-1.5">{t.ergebnis}</p>
                <p className="text-5xl font-bold font-mono leading-none" style={{ color: pctColor }}>
                  {r.pct} %
                </p>
                {r.leistung > 0 && (
                  <p className="text-2xl font-bold font-mono text-slate-800 mt-2">
                    {r.leistung.toLocaleString("de-DE", { minimumFractionDigits: 2 })} € <span className="text-sm font-normal text-slate-400">/ {t.monatlicheLeistung.charAt(0).toLowerCase() + t.monatlicheLeistung.slice(1)}</span>
                  </p>
                )}
                <p className="text-xs text-slate-500 mt-2 leading-snug max-w-sm mx-auto">{r.details}</p>
              </div>

              {/* ═══ CALCULATION BREAKDOWN (collapsible) ═══ */}
              {!beziehtSozialleistung && r.einkommen !== null && (() => {
                const abz1 = (nettoE1 || 0) > 0 ? ARBEITSMITTEL_PAUSCHALE : 0;
                const abz2 = (!isAlleinerziehend && (nettoE2 || 0) > 0) ? ARBEITSMITTEL_PAUSCHALE : 0;
                const anr1 = Math.max(0, (nettoE1 || 0) - abz1 - (fahrtkostenE1 || 0)) + (sonstigeE1 || 0);
                const anr2 = isAlleinerziehend ? 0 : Math.max(0, (nettoE2 || 0) - abz2 - (fahrtkostenE2 || 0)) + (sonstigeE2 || 0);
                const eurFmt = v => Math.abs(v).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                const Row = ({ label, val, sign, muted }) => (
                  <div className={`flex justify-between text-[12px] py-0.5 ${muted ? "text-slate-300 italic" : "text-slate-500"}`}>
                    <span>{label}</span>
                    <span className="font-mono">{muted ? "—" : `${sign} ${eurFmt(val)} €`}</span>
                  </div>
                );
                const Sub = ({ label, val }) => (
                  <div className="flex justify-between text-[12px] font-bold text-slate-600 pt-1.5 mt-1 border-t border-slate-100">
                    <span>{label}</span><span className="font-mono">{eurFmt(val)} €</span>
                  </div>
                );
                return (
                  <div className="mt-3">
                    <button onClick={() => setShowBreakdown(!showBreakdown)}
                      className="w-full text-center text-xs font-semibold py-2 rounded-lg transition-colors"
                      style={{ color: VOLT, backgroundColor: showBreakdown ? VOLT_LIGHT : "transparent" }}>
                      {showBreakdown ? t.berechnungAusblenden : t.berechnungAnzeigen}
                    </button>
                    {showBreakdown && (
                      <div className="mt-2 rounded-xl bg-white border border-slate-100 overflow-hidden" style={{ boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                        <div className="px-4 py-3">
                          <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">
                            {isAlleinerziehend ? t.einkommen : t.einkommenElternteil1}
                          </p>
                          {(nettoE1 || 0) > 0 ? (<>
                            <Row label={t.nettoLabel} val={nettoE1} sign="" />
                            <Row label={t.arbeitsmittelpauschale} val={ARBEITSMITTEL_PAUSCHALE} sign="−" />
                            <Row label={t.fahrtkostenLabel} val={fahrtkostenE1 || 0} sign="−" />
                            <Row label={t.sonstigeLabel} val={sonstigeE1 || 0} sign="+" />
                          </>) : <Row label={t.nichtBerufstaetig} val={0} sign="" muted />}
                          <Sub label={`${t.anrechenbar} ${isAlleinerziehend ? "" : "E1"}`} val={anr1} />

                          {!isAlleinerziehend && (<>
                            <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mt-3 mb-1.5">{t.einkommenElternteil2}</p>
                            {(nettoE2 || 0) > 0 ? (<>
                              <Row label={t.nettoLabel} val={nettoE2} sign="" />
                              <Row label={t.arbeitsmittelpauschale} val={ARBEITSMITTEL_PAUSCHALE} sign="−" />
                              <Row label={t.fahrtkostenLabel} val={fahrtkostenE2 || 0} sign="−" />
                              <Row label={t.sonstigeLabel} val={sonstigeE2 || 0} sign="+" />
                            </>) : <Row label={t.nichtBerufstaetig} val={0} sign="" muted />}
                            <Sub label={`${t.anrechenbar} E2`} val={anr2} />
                          </>)}

                          <hr className="my-2.5 border-slate-100" />
                          <Row label={t.kindergeldAntragskind} val={KINDERGELD} sign="+" />
                          <Row label={t.kindesunterhaltLabel} val={kindesunterhalt || 0} sign="+" />
                          <Row label={t.versicherungLabel} val={versicherungAbzug || 0} sign="−" />

                          <div className="flex justify-between text-[13px] font-bold pt-2 mt-1.5 border-t-2 border-slate-200" style={{ color: VOLT }}>
                            <span>{t.anrechenbaresEinkommen}</span>
                            <span className="font-mono">{eurFmt(r.einkommen)} €</span>
                          </div>
                        </div>
                        <div className="px-4 py-2.5 bg-slate-50 border-t border-slate-100">
                          <p className="text-[10px] text-slate-400 leading-relaxed">ℹ️ {t.kindergeldHinweis}</p>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Single bar + table (only for non-Sozialleistung) */}
              {!beziehtSozialleistung && r.einkommen !== null && (
                <div className="border-t pt-4 mt-3" style={{ borderColor: resultBorder }}>
                  <p className="text-[10px] uppercase tracking-[2px] text-slate-400 mb-2">{t.einordnung}</p>

                  {/* Zone bar */}
                  <div dir="ltr" className="relative h-6 rounded-full overflow-visible">
                    <div className="absolute inset-0 rounded-full overflow-hidden flex" style={{ backgroundColor: "#fee2e2" }}>
                      <div className="h-full" style={{ width: `${pos(r.ekg1)}%`, backgroundColor: "#bbf7d0" }} />
                      <div className="h-full" style={{ width: `${pos(r.ekg3) - pos(r.ekg1)}%`, backgroundColor: "#86efac" }} />
                      <div className="h-full" style={{ width: `${pos(r.ekg4) - pos(r.ekg3)}%`, backgroundColor: "#fde68a" }} />
                    </div>

                    {/* Threshold ticks */}
                    {[
                      { p: pos(r.ekg1), c: "#16a34a" },
                      { p: pos(r.ekg3), c: "#15803d" },
                      { p: pos(r.ekg4), c: "#d97706" },
                    ].map((tick, i) => (
                      <div key={i} className="absolute top-0 bottom-0 w-px" style={{ left: `${tick.p}%`, backgroundColor: tick.c, opacity: 0.5 }} />
                    ))}

                    {/* Income marker: thin violet line */}
                    <div className="absolute top-0 bottom-0 z-10"
                      style={{ left: `${pos(r.einkommen)}%`, transform: "translateX(-50%)" }}>
                      <div className="w-1 h-full" style={{ backgroundColor: "#502379" }} />
                    </div>
                  </div>

                  {/* Income label below marker */}
                  {(() => {
                    const mp = pos(r.einkommen);
                    const align = mp < 25 ? "start" : mp > 75 ? "end" : "center";
                    const tx = mp < 25 ? "translateX(0)" : mp > 75 ? "translateX(-100%)" : "translateX(-50%)";
                    return (
                      <div dir="ltr" className="relative h-8 mt-1">
                        <div className="absolute flex flex-col"
                          style={{ left: `${mp}%`, transform: tx, alignItems: align === "start" ? "flex-start" : align === "end" ? "flex-end" : "center" }}>
                          <span className="text-[10px] font-bold" style={{ color: VOLT, transform: align === "start" ? "translateX(0)" : align === "end" ? `translateX(0)` : "none" }}>▲</span>
                          <span className="text-[10px] font-bold whitespace-nowrap" style={{ color: VOLT }}>{t.ihrEinkommen}: {eur(r.einkommen)} €</span>
                        </div>
                      </div>
                    );
                  })()}

                  {/* EKG table */}
                  <div className="mt-2 rounded-lg overflow-hidden border border-slate-100">
                    <table className="w-full text-[11px]">
                      <tbody>
                        {[
                          { zone: "#bbf7d0", label: "EKG1", range: "100 %", val: r.ekg1, color: "#16a34a" },
                          { zone: "#86efac", label: "EKG3", range: "100 %", val: r.ekg3, color: "#15803d" },
                          { zone: "#fde68a", label: "EKG4", range: "50 %", val: r.ekg4, color: "#d97706" },
                          { zone: "#fee2e2", label: t.darüber, range: "0 %", val: null, color: "#dc2626" },
                        ].map((row, i) => (
                          <tr key={i} className="border-b border-slate-50 last:border-0">
                            <td className="py-1.5 px-2.5">
                              <div className="w-3 h-3 rounded-sm" style={{ backgroundColor: row.zone }} />
                            </td>
                            <td className="py-1.5 font-semibold" style={{ color: row.color }}>{row.label}</td>
                            <td className="py-1.5 font-bold" style={{ color: row.color }}>{row.range}</td>
                            <td className="py-1.5 px-2.5 text-end font-mono text-slate-400">
                              {row.val ? `${t.bis} ${eur(row.val)} €` : ""}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Parameter details */}
                  <div className="mt-3 text-[10px] text-slate-400 leading-relaxed">
                    <span className="font-semibold">{t.grundbetrag}:</span> {GRUNDBETRAG} € · <span className="font-semibold">{t.familienzuschlag}:</span> {haushaltGroesse - 1}×{FAMILIENZUSCHLAG} € · <span className="font-semibold">{t.hoechstmiete}:</span> {HOECHSTMIETE[Math.min(haushaltGroesse, 6)]} €
                    <br />
                    <span className="font-semibold">{t.kindergeld}:</span> {KINDERGELD} € ({t.autoAngerechnet}) · <span className="font-semibold">{t.arbeitsmittel}:</span> {ARBEITSMITTEL_PAUSCHALE.toFixed(2)} €{t.proPerson}
                  </div>
                </div>
              )}

              {/* ═══ HINWEISE & ANTRAG ═══ */}
              <div className="border-t pt-4 mt-4" style={{ borderColor: resultBorder }}>
                {/* Knapp über EKG4: rechnerisch 0 %, praktisch aussichtsreich. */}
                {r.nahGrenze && (
                  <div className="bg-white/70 border border-amber-200 rounded-lg px-3 py-2.5 mb-2.5 text-[11px] text-slate-700 leading-snug">
                    💡 {t.grenznaeheHinweis}
                  </div>
                )}

                {/* Antrag lohnt sich bei Zuschuss > 0 % und im Grenzfall. */}
                {(r.pct > 0 || r.nahGrenze) && (
                  <a href={ANTRAG_URL} target="_blank" rel="noopener noreferrer"
                    className="block w-full text-center px-4 py-2.5 mb-2.5 rounded-lg text-[13px] font-bold text-white no-underline transition-opacity hover:opacity-90"
                    style={{ backgroundColor: VOLT }}>
                    {t.antragLink} {dir === "rtl" ? "←" : "→"}
                  </a>
                )}

                <p className="text-[10px] text-slate-400 leading-relaxed">ℹ️ {t.ermessensHinweis}</p>
                <p className="text-[10px] text-slate-400 leading-relaxed mt-1.5">🍽️ {t.butHinweis}</p>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Footer */}
      <div className="text-center mt-5 text-[10px] text-slate-400 leading-relaxed">
        {t.privacy}
        <br />{t.rechtsgrundlage}: § 90 Abs. 4 SGB VIII i.V.m. §§ 82, 85 SGB XII · GR-Beschluss 21.07.2020 / 23.03.2021
        <br />Regelbedarfsstufe 1: {REGELBEDARFSSTUFE_1} € (2025/2026) · {t.kindergeld}: {KINDERGELD} €
        <br />{t.stand}
      </div>
    </div>
  );
}

    // ─── RENDER ─────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(KitaZuschussRechner));
  </script>
</body>
</html>
