<script>
	(function () {
		const form = document.getElementById("calc-form");

		form.addEventListener("input", () => {
			recalculate();
		});

		// initial calculation
		recalculate();

		function recalculate() {
			const data = getFormValues(form);

			const GRUNDBETRAG = 1126;
			const FAMILY_FACTOR = 395;

			const rentTable = {
				1: 511,
				2: 619,
				3: 737,
				4: 858,
				5: 982,
				6: 1101,
			};

			const familySize = data.family_slider;
			const rentLevel = data.rent_slider;

			const familyAmount = FAMILY_FACTOR * familySize;
			const rentAmount = rentTable[rentLevel] || 0;
			const rent20 = Math.floor(rentAmount * 1.2);

			const familyEl = document.getElementById("family_amount");
			familyEl.value = formatNumber(familyAmount);
			familyEl.dataset.value = String(familyAmount);

			const rentEl = document.getElementById("rent_amount");
			rentEl.value = formatNumber(rent20);
			rentEl.dataset.value = String(rent20);

			document.getElementById("family_slider_value").textContent = familySize;
			document.getElementById("rent_slider_value").textContent = rentLevel;

			const ekg1 = GRUNDBETRAG + familyAmount + rent20;
			const ekg3 = ekg1 * 1.2 + data.special_burdon;
			const ekg4 = ekg1 * 1.3 + data.special_burdon;

			const totalIncome = calculateTotalIncome(data);
			const totalExpenses = calculateTotalExpenses(data);

			const result = totalIncome - totalExpenses;

			const resultMessage = document.getElementById("result-message");
			resultMessage.style.fontWeight = "500";

			if (result < ekg3) {
				resultMessage.textContent = "Die Kosten werden vollständig übernommen.";
				resultMessage.style.color = "rgb(22 163 74)"; // green-600
			} else if (result < ekg4) {
				resultMessage.textContent = "Die Kosten werden hälftig übernommen.";
				resultMessage.style.color = "rgb(202 138 4)"; // yellow-600
			} else {
				resultMessage.textContent = "Es erfolgt keine Übernahme der Kosten.";
				resultMessage.style.color = "rgb(220 38 38)"; // red-600
			}

			// --- Visualization update (updates EKG bar and indicator) ---
			const segG = document.getElementById("segment-green");
			const segY = document.getElementById("segment-yellow");
			const segR = document.getElementById("segment-red");
			const m1 = document.getElementById("marker-ekg1");
			const m3 = document.getElementById("marker-ekg3");
			const m4 = document.getElementById("marker-ekg4");
			const resInd = document.getElementById("result-indicator");
			const lblEkg1 = document.getElementById("label-ekg1");
			const lblEkg3 = document.getElementById("label-ekg3");
			const lblEkg4 = document.getElementById("label-ekg4");

			if (segG && segY && segR && m1 && m3 && m4 && resInd) {
				let min = Math.min(ekg1, result);
				let max = Math.max(ekg4, result, ekg1);

				const span = max - min;
				const padding =
					span > 0 ? span * 0.12 : Math.max(100, Math.abs(max) * 0.12, 100);
				min -= padding;
				max += padding;

				const range = max - min || 1;
				const toPct = (v) => ((v - min) / range) * 100;

				const pEkg1 = Math.min(100, Math.max(0, toPct(ekg1)));
				const pEkg3 = Math.min(100, Math.max(0, toPct(ekg3)));
				const pEkg4 = Math.min(100, Math.max(0, toPct(ekg4)));
				const pResult = Math.min(100, Math.max(0, toPct(result)));

				segG.style.left = "0%";
				segG.style.width = `${Math.max(0, pEkg3)}%`;

				segY.style.left = `${pEkg3}%`;
				segY.style.width = `${Math.max(0, pEkg4 - pEkg3)}%`;

				segR.style.left = `${pEkg4}%`;
				segR.style.width = `${Math.max(0, 100 - pEkg4)}%`;

				m1.style.left = `${pEkg1}%`;
				m3.style.left = `${pEkg3}%`;
				m4.style.left = `${pEkg4}%`;
				if (lblEkg1) {
					lblEkg1.style.left = `${pEkg1}%`;
					lblEkg1.textContent = `EKG1 - ${formatEUR(ekg1)}`;
				}
				if (lblEkg3) {
					lblEkg3.style.left = `${pEkg3}%`;
					lblEkg3.textContent = `EKG3 - ${formatEUR(ekg3)}`;
				}
				if (lblEkg4) {
					lblEkg4.style.left = `${pEkg4}%`;
					lblEkg4.textContent = `EKG4 - ${formatEUR(ekg4)}`;
				}

				resInd.style.left = `${pResult}%`;
				resInd.setAttribute("title", `Ergebnis: ${formatEUR(result)}`);
				resInd.setAttribute("aria-valuenow", String(Math.round(pResult)));

				const bubble = document.getElementById("result-bubble");
				if (bubble) {
					bubble.style.left = `${pResult}%`;
					bubble.textContent = formatEUR(result);

					if (result < ekg3) {
						bubble.style.borderColor = "#16a34a";
						bubble.style.color = "#065f46";
						bubble.style.background = "rgba(220, 253, 220, 0.95)";
						resInd.style.background = "#16a34a";
						resInd.style.boxShadow = "0 0 18px rgba(16,185,129,0.15)";
					} else if (result < ekg4) {
						bubble.style.borderColor = "#f59e0b";
						bubble.style.color = "#92400e";
						bubble.style.background = "rgba(255, 249, 230, 0.95)";
						resInd.style.background = "#f59e0b";
						resInd.style.boxShadow = "0 0 18px rgba(245,158,11,0.12)";
					} else {
						bubble.style.borderColor = "#dc2626";
						bubble.style.color = "#7f1d1d";
						bubble.style.background = "rgba(255, 238, 238, 0.95)";
						resInd.style.background = "#dc2626";
						resInd.style.boxShadow = "0 0 20px rgba(220,38,38,0.14)";
					}
				}
			}
		}

		function calculateTotalIncome(data) {
			const parentIncome =
				data.split_a_income +
				data.split_a_other_income +
				data.split_b_income +
				data.split_b_other_income;

			return data.child_benefit + data.child_support + parentIncome;
		}

		function calculateTotalExpenses(data) {
			const parentExpenses =
				data.split_a_expenses +
				data.split_a_commute +
				data.split_b_expenses +
				data.split_b_commute;

			return (
				parentExpenses +
				data.insurance_home +
				data.insurance_accident +
				data.other_deductions
			);
		}

		function getFormValues(form) {
			const values = {};

			for (const element of form.elements) {
				if (!element.name) continue;

				if (element.dataset && element.dataset.value !== undefined) {
					values[element.name] = Number.parseFloat(element.dataset.value) || 0;
					continue;
				}

				if (element.type === "checkbox") {
					values[element.name] = element.checked;
				} else {
					values[element.name] = toNumber(element.value);
				}
			}

			return values;
		}

		function toNumber(value) {
			return Number.parseFloat(value) || 0;
		}

		function formatEUR(value) {
			return new Intl.NumberFormat("de-DE", {
				style: "currency",
				currency: "EUR",
			}).format(value);
		}

		function formatNumber(value) {
			return new Intl.NumberFormat("de-DE", {
				minimumFractionDigits: 2,
				maximumFractionDigits: 2,
			}).format(value);
		}
	})();
</script>
